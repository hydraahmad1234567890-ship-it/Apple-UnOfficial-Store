<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | Apple Store</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .success-container {
            width: 600px;
            max-width: 90%;
            margin: 150px auto;
            text-align: center;
        }
        .icon { font-size: 5rem; color: #55efc4; margin-bottom: 30px; }
        h1 { font-size: 3rem; margin-bottom: 20px; }
        p { color: var(--text-sub); margin-bottom: 40px; font-size: 1.2rem; }
        .btn { padding: 15px 40px; background: var(--text-main); color: #fff; text-decoration: none; border-radius: 12px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="icon">&#10004;</div>
        <h1>Order Received!</h1>
        <p>Thank you for your purchase. Your order has been received and is being processed. You will receive an email confirmation shortly.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>
</body>
</html>
