<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Apple Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .checkout-container {
            width: 1140px;
            max-width: 90%;
            margin: 100px auto;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 60px;
        }
        .checkout-form {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .checkout-form h2 {
            margin-bottom: 30px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.1);
            outline: none;
        }
        .order-summary {
            background: #f5f5f7;
            padding: 40px;
            border-radius: 24px;
            height: fit-content;
        }
        .order-summary h2 { margin-bottom: 20px; }
        .place-order-btn {
            width: 100%;
            background: var(--primary-color);
            color: #fff;
            padding: 18px;
            border-radius: 14px;
            font-weight: 700;
            margin-top: 30px;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Apple Store</div>
    </header>

    <div class="checkout-container">
        <div class="checkout-form">
            <h2>Shipping Information</h2>
            <form id="order-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label>Street Address</label>
                    <input type="text" required>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Zip Code</label>
                        <input type="text" required>
                    </div>
                </div>
            </form>
        </div>
        <div class="order-summary">
            <h2>Review Order</h2>
            <div id="order-items"></div>
            <hr style="margin: 20px 0; opacity: 0.1;">
            <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 1.4rem;">
                <span>Total</span>
                <span id="final-total">$0.00</span>
            </div>
            <button class="place-order-btn" onclick="placeOrder()">Place Your Order</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function renderSummary() {
            const list = document.getElementById('order-items');
            let subtotal = 0;
            cart.forEach(item => {
                const priceNum = parseFloat(item.price.replace('$', '').replace(',', ''));
                subtotal += priceNum * item.quantity;
                const div = document.createElement('div');
                div.style.display = 'flex';
                div.style.justifyContent = 'space-between';
                div.style.marginBottom = '10px';
                div.innerHTML = `<span>${item.title} x ${item.quantity}</span> <span>${item.price}</span>`;
                list.appendChild(div);
            });
            document.getElementById('final-total').textContent = `$${(subtotal * 1.08).toLocaleString()}`;
        }

        function placeOrder() {
            const form = document.getElementById('order-form');
            if (!form.checkValidity()) {
                alert('Please fill out all fields.');
                return;
            }
            
            const order = {
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                items: cart,
                total: document.getElementById('final-total').textContent,
                status: 'Processing'
            };

            let orders = JSON.parse(localStorage.getItem('apple_orders')) || [];
            orders.push(order);
            localStorage.setItem('apple_orders', JSON.stringify(orders));
            
            cart = [];
            saveCart();
            alert('Order placed successfully! Redirecting to success page...');
            location.href = 'success.html';
        }

        renderSummary();
    </script>
</body>
</html>
