<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Apple Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background: #1d1d1f;
            color: #fff;
            padding: 40px 20px;
        }
        .sidebar h2 { margin-bottom: 40px; }
        .sidebar ul { list-style: none; }
        .sidebar ul li { margin-bottom: 20px; }
        .sidebar ul li a { color: rgba(255,255,255,0.6); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .sidebar ul li a.active, .sidebar ul li a:hover { color: #fff; }
        
        .main-content {
            padding: 50px;
            background: #f5f5f7;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 50px;
        }
        .stat-card {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .stat-card h3 { color: var(--text-sub); font-size: 0.9rem; margin-bottom: 10px; }
        .stat-card p { font-size: 2rem; font-weight: 800; }

        .table-container {
            background: #fff;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #f0f0f0; }
        th { color: var(--text-sub); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        .status { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status.processing { background: #fff8e6; color: #ffab00; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <h2>Admin Portal</h2>
            <ul>
                <li><a href="#" class="active">Dashboard</a></li>
                <li><a href="admin-products.html">Products</a></li>
                <li><a href="admin-orders.html">Orders</a></li>
                <li><a href="admin-users.html">Users</a></li>
                <li><a href="admin-analytics.html">Analytics</a></li>
                <li><a href="index.html">Back to Store</a></li>
            </ul>
        </div>
        <div class="main-content">
            <h1>Dashboard Overview</h1>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Revenue</h3>
                    <p id="total-revenue">$0.00</p>
                </div>
                <div class="stat-card">
                    <h3>Total Orders</h3>
                    <p id="total-orders">0</p>
                </div>
                <div class="stat-card">
                    <h3>Total Products</h3>
                    <p>8</p>
                </div>
            </div>

            <div class="table-container">
                <h2>Recent Orders</h2>
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Total</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const orders = JSON.parse(localStorage.getItem('apple_orders')) || [];
        const tableBody = document.querySelector('#orders-table tbody');
        let totalRevenue = 0;

        orders.forEach(order => {
            const rev = parseFloat(order.total.replace('$', '').replace(',', ''));
            totalRevenue += rev;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>#${order.id.toString().slice(-6)}</td>
                <td>${order.date}</td>
                <td>${order.total}</td>
                <td><span class="status processing">${order.status}</span></td>
            `;
            tableBody.appendChild(tr);
        });

        document.getElementById('total-revenue').textContent = `$${totalRevenue.toLocaleString()}`;
        document.getElementById('total-orders').textContent = orders.length;
    </script>
</body>
</html>
