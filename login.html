<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Apple Store</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            width: 400px;
            max-width: 90%;
            margin: 150px auto;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(0,0,0,0.05);
            text-align: center;
        }
        .login-container h2 { margin-bottom: 30px; font-size: 2rem; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); }
        .login-btn { width: 100%; padding: 15px; background: var(--text-main); color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Sign In</h2>
        <form onsubmit="event.preventDefault(); location.href='index.html';">
            <div class="form-group">
                <label>Email</label>
                <input type="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" required>
            </div>
            <button class="login-btn">Sign In</button>
        </form>
        <p style="margin-top: 20px; color: var(--text-sub);">Don't have an account? <a href="register.html" style="color: var(--primary-color);">Register</a></p>
    </div>
</body>
</html>
