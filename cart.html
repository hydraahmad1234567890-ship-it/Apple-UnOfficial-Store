<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Apple Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .cart-container {
            width: 1140px;
            max-width: 90%;
            margin: 100px auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 50px;
        }
        .cart-items {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-info h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        .cart-item-info p {
            color: var(--text-sub);
            font-size: 0.9rem;
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f5f5f7;
            padding: 5px 15px;
            border-radius: 10px;
        }
        .quantity-controls button {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 5px;
        }
        .cart-summary {
            background: #1d1d1f;
            color: #fff;
            padding: 30px;
            border-radius: 20px;
            height: fit-content;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .total-row {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: 800;
        }
        .checkout-btn {
            width: 100%;
            background: var(--primary-color);
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 30px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Apple Store</div>
        <nav>
            <ul class="main-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="store.html">Store</a></li>
                <li><a href="info.html">Info</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="chatting-dashboard.html">Chat</a></li>
                <li><a href="cart.html" class="cart-link">Cart (<span class="cart-count">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <div class="cart-container">
        <div class="cart-items" id="cart-items-list">
            <!-- Items will be injected -->
        </div>
        <div class="cart-summary">
            <h2>Order Summary</h2>
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">$0.00</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>FREE</span>
            </div>
            <div class="summary-row">
                <span>Tax</span>
                <span id="tax">$0.00</span>
            </div>
            <div class="total-row">
                <span>Total</span>
                <span id="total">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="location.href='checkout.html'">Checkout</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function renderCart() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = '';
            
            if (cart.length === 0) {
                list.innerHTML = '<h3>Your cart is empty.</h3>';
                return;
            }

            let subtotal = 0;

            cart.forEach(item => {
                const priceNum = parseFloat(item.price.replace('$', '').replace(',', ''));
                subtotal += priceNum * item.quantity;

                const el = document.createElement('div');
                el.className = 'cart-item';
                el.innerHTML = `
                    <img src="${item.image}" alt="${item.title}">
                    <div class="cart-item-info">
                        <h3>${item.title}</h3>
                        <p>${item.topic}</p>
                    </div>
                    <div class="quantity-controls">
                        <button onclick="updateQuantity(${item.id}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQuantity(${item.id}, 1)">+</button>
                    </div>
                    <div class="price">${item.price}</div>
                `;
                list.appendChild(el);
            });

            document.getElementById('subtotal').textContent = `$${subtotal.toLocaleString()}`;
            document.getElementById('tax').textContent = `$${(subtotal * 0.08).toLocaleString()}`;
            document.getElementById('total').textContent = `$${(subtotal * 1.08).toLocaleString()}`;
        }

        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                saveCart();
                renderCart();
            }
        }

        renderCart();
    </script>
</body>
</html>
